name: PKScreener Auto Scan

on:
  schedule:
    - cron: '0 3 * * 1-5'
    - cron: '15 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance

      - name: Run PKScreener scans
        run: python scan.py

      - name: Inject data into dashboard
        run: python inject.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "PKScreener Bot"
          git config user.email "pkscreener-bot@github-actions"
          git add data.json dashboard.html
          git diff --staged --quiet || git commit -m "Auto scan: $(date +'%d %b %Y %H:%M IST')"
          git push
```

**4.** Scroll down → click **"Commit changes"** → click **"Commit changes"** again in the popup

